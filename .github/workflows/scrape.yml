name: 🤖 Mise à jour catalogue

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scraper les sites francophones
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run scraper
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: 📊 Vérification du JSON
        run: |
          python check_catalogue.py

      - name: 💾 Commit & Push catalogue mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalogue-fr.json
          if git diff --staged --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Mise a jour catalogue"
            git push
          fi
